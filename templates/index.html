<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>

    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

<header>
    <h1>{{.Title}}</h1>
</header>

<main>

<div class="artists">

{{range .Artists}}

<div class="card">

    <img src="{{.Image}}" alt="{{.Name}}">

    <h2>{{.Name}}</h2>

    <p>Created: {{.CreationDate}}</p>

    <p>First Album: {{.FirstAlbum}}</p>

    <a href="/artist?id={{.ID}}">
        View Details
    </a>

</div>

{{end}}

</div>

</main>

</body>
</html>

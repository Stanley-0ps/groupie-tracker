<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groupie Tracker</title>

    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <h1>{{.Title}}</h1>
<div class="artists">
        {{range .Artists}}

<div class="card">
    <img src="{{.Image}}">

    <h2>{{.Name}}</h2>

    <p>Created: {{.CreationDate}}</p>

    <a href="/artist?id={{.ID}}">
        View Details
    </a>
    </div>

{{end}}
    </div>
</body>
</html>
